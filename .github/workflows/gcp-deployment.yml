name: Capstone Project Platform - GCP Deployment
on: push

jobs:
  deploy:
    runs-on: ubuntu-latest


    env:
      VM_NAME: vm-platform-seed
      ZONE: asia-southeast1-b
      USER_NAME: sehansassara2002
      IMAGE_NAME: vm-platform-seed-boot-image-v2


    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
        - name: Authenticate to Google Cloud
          uses: google-github-actions/auth@v3
          with:
            workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
            service_account: ${{ secrets.GCP_SA_EMAIL }}
            project_id: ${{ secrets.GCP_PROJECT_ID }}

        - name: Set up gcloud Cloud SDK environment
          uses: google-github-actions/setup-gcloud@v3.0.1

        - name: Start the vm-platform-seed instance
          run: gcloud compute instances start ${{env.VM_NAME}} --zone=${{env.ZONE}}

        - name: Connect with the vm-platform-seed instance through SSH, pull the latest code and build the project
          run: >
            gcloud compute ssh ${{env.USER_NAME}}@${{env.VM_NAME}} --zone=${{env.ZONE}}
            --command "echo 'Connected to vm-platform-seed successfully!' &&
            cd Capstone-Project-Platform/ && 
            git pull --recurse-submodules &&
            source ~/.bashrc &&
            mvn clean package
            "

        - name: Stop the vm-platform-seed instance
          run: gcloud compute instances stop ${{env.VM_NAME}} --zone=${{env.ZONE}}

        - name: Delete the boot disk image
          run: gcloud compute images delete ${{env.IMAGE_NAME}}
            
