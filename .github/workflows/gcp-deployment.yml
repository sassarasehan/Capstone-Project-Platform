name: Capstone Project Platform - GCP Deployment
on: push

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VM_NAME: vm-platform-seed
      INSTANCE_GROUP: mig-platform
      INSTANCE_TEMPLATE: tmp-vm-platform-seed-v2
      REGION: asia-southeast1
      ZONE: asia-southeast1-b
      USER_NAME: sehansassara2002
      IMAGE_NAME: vm-platform-seed-boot-image-v2

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up gcloud Cloud SDK environment
        uses: google-github-actions/setup-gcloud@v3.0.1

      - name: Start the vm-platform-seed instance
        run: gcloud compute instances start ${{env.VM_NAME}} --zone=${{env.ZONE}}

      - name: Connect with the vm-platform-seed instance through SSH, pull the latest code and build the project
        run: >
          gcloud compute ssh ${{env.USER_NAME}}@${{env.VM_NAME}} --zone=${{env.ZONE}}
          --command "
          echo 'Connected to vm-platform-seed successfully!' &&
          cd Capstone-Project-Platform/ && 
          git pull --recurse-submodules &&
          source ~/.bashrc &&
          mvn clean package &&
          
          # Add hosts file entry
          echo '127.0.0.1 config.platform' | sudo tee -a /etc/hosts &&
          
          # Create systemd service for auto-start
          sudo tee /etc/systemd/system/microservices.service > /dev/null << 'EOF'
          
          [Unit]
          Description=Microservices
          After=network.target
  
          [Service]
          Type=oneshot
          User=${{env.USER_NAME}}
          WorkingDirectory=/home/${{env.USER_NAME}}/Capstone-Project-Platform
          ExecStart=/bin/bash -c '
          cd /home/${{env.USER_NAME}}/Capstone-Project-Platform
          nohup java -jar -Dserver.port=9000 config-server/target/Config-Server-1.0.0.jar > /tmp/config-server.log 2>&1 &
          sleep 15
          nohup java -jar -Dserver.port=9001 service-registry/target/Service-Registry-1.0.0.jar > /tmp/service-registry.log 2>&1 &
          sleep 15
          nohup java -jar -Dserver.port=7000 -Deureka.client.service-url.defaultZone=http://localhost:9001/eureka/ api-gateway/target/Api-Gateway-1.0.0.jar > /tmp/api-gateway.log 2>&1 &
          '
          RemainAfterExit=yes

                [Install]
                WantedBy=multi-user.target
                EOF
            
                            sudo systemctl daemon-reload &&
                            sudo systemctl enable microservices.service &&
                            echo 'Setup complete!'
                  "

                - name: Stop the vm-platform-seed instance
                  run: gcloud compute instances stop ${{env.VM_NAME}} --zone=${{env.ZONE}}

                - name: Delete the boot disk image
                  run: gcloud compute images delete ${{env.IMAGE_NAME}}
                  continue-on-error: true

      - name: Create a new boot disk image with the previous image name
        run: |
          gcloud compute images create ${{env.IMAGE_NAME}} \
          --source-disk=${{env.VM_NAME}} \
          --source-disk-zone=${{env.ZONE}} \
          --storage-location=${{env.REGION}}

      - name: Update the instance group with the new image
        run: |
          gcloud compute instance-groups managed rolling-action start-update ${{env.INSTANCE_GROUP}} \
          --region=${{env.REGION}} \
          --type=proactive \
          --max-unavailable=3 \
          --minimal-action=replace \
          --replacement-method=recreate \
          --max-surge=0 \
          --version=template=projects/${{ secrets.GCP_PROJECT_ID }}/regions/${{ env.REGION }}/instanceTemplates/${{ env.INSTANCE_TEMPLATE }}